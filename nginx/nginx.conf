events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    sendfile      on;

    upstream mirage_backend {
        server backend:8081;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Frontend static files
        root  /usr/share/nginx/html;
        index index.html;

        # REST API proxy
        location /api/ {
            proxy_pass            http://mirage_backend;
            proxy_http_version    1.1;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
        }

        # WebSocket proxy
        location /ws/ {
            proxy_pass            http://mirage_backend;
            proxy_http_version    1.1;
            proxy_set_header      Upgrade           $http_upgrade;
            proxy_set_header      Connection        "upgrade";
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
            proxy_buffering       off;
        }

        # Health check passthrough
        location /health {
            proxy_pass http://mirage_backend;
        }

        # SPA fallback — all unknown paths serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # --- TLS upgrade (when you get a domain) ---
    # 1. Replace the server block above with the one below.
    # 2. Add certs to ./nginx/certs/mirage.crt and ./nginx/certs/mirage.key.
    # 3. Add "- 443:443" to the nginx ports in docker-compose.yml.
    #
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/certs/mirage.crt;
    #     ssl_certificate_key /etc/nginx/certs/mirage.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ... (same location blocks as above)
    # }
}
